<div class="login-container">
  
  <!-- Egy szép, árnyékos kártya a Material dizájnból -->
  <mat-card class="login-card">
    
    <mat-card-header>
      <mat-card-title>Bejelentkezés</mat-card-title>
      <mat-card-subtitle>Kérjük, add meg az adataidat</mat-card-subtitle>
    </mat-card-header>
    <br>
    <mat-card-content>
      <!-- Email mező -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email cím</mat-label>
        <input matInput type="email" [(ngModel)]="beirtEmail" placeholder="pl. teszt@elek.hu">
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <!-- Jelszó mező -->
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Jelszó</mat-label>
        <input matInput type="password" [(ngModel)]="beirtJelszo" placeholder="Titkos jelszó">
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>
    </mat-card-content>

    <mat-card-actions align="end">
      <!-- Belépés gomb rákötve a függvényre -->
      <button mat-raised-button color="primary" (click)="belepes()">Belépés</button>
    </mat-card-actions>
    
  </mat-card>

</div>
